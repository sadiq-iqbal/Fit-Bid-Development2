kind = "web"
previewPath = "/"
title = "FitBid"
version = "1.0.0"
id = "artifacts/fitbid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26261

[services.development]
run = "pnpm --filter @workspace/fitbid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitbid", "run", "build" ]
publicDir = "artifacts/fitbid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26261"
BASE_PATH = "/"
