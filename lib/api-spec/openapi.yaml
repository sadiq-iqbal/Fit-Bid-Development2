components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — Bearer <sid>.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── Auth ──────────────────────────────────────────────────────────────
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ─── Users ─────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role, name, createdAt]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        role:
          type: [string, 'null']
          enum: [client, trainer, nutritionist, admin, null]
        name:
          type: [string, 'null']
        avatarUrl:
          type: [string, 'null']
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserWithProfile:
      type: object
      required: [id, email, role, name, createdAt]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        role:
          type: [string, 'null']
          enum: [client, trainer, nutritionist, admin, null]
        name:
          type: [string, 'null']
        avatarUrl:
          type: [string, 'null']
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        clientProfile:
          oneOf:
            - $ref: '#/components/schemas/ClientProfile'
            - type: 'null'
        professionalProfile:
          oneOf:
            - $ref: '#/components/schemas/ProfessionalProfile'
            - type: 'null'

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string

    OnboardingInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [client, trainer, nutritionist]
        clientProfile:
          $ref: '#/components/schemas/ClientProfileInput'
        professionalProfile:
          $ref: '#/components/schemas/ProfessionalProfileInput'

    # ─── Client Profile ────────────────────────────────────────────────────
    ClientProfile:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        age:
          type: [integer, 'null']
        gender:
          type: [string, 'null']
        heightCm:
          type: [number, 'null']
        weightKg:
          type: [number, 'null']
        bmi:
          type: [number, 'null']
        healthConditions:
          type: array
          items:
            type: string
        fitnessGoals:
          type: array
          items:
            type: string
        activityLevel:
          type: [string, 'null']
          enum: [sedentary, lightly_active, moderately_active, very_active, null]
        budgetMin:
          type: [number, 'null']
        budgetMax:
          type: [number, 'null']
        preferredDurationWeeks:
          type: [integer, 'null']

    ClientProfileInput:
      type: object
      properties:
        age:
          type: integer
        gender:
          type: string
        heightCm:
          type: number
        weightKg:
          type: number
        healthConditions:
          type: array
          items:
            type: string
        fitnessGoals:
          type: array
          items:
            type: string
        activityLevel:
          type: string
          enum: [sedentary, lightly_active, moderately_active, very_active]
        budgetMin:
          type: number
        budgetMax:
          type: number
        preferredDurationWeeks:
          type: integer

    # ─── Professional Profile ──────────────────────────────────────────────
    ProfessionalProfile:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
        name:
          type: [string, 'null']
        avatarUrl:
          type: [string, 'null']
        specialty:
          type: [string, 'null']
        bio:
          type: [string, 'null']
        yearsExperience:
          type: [integer, 'null']
        certifications:
          type: array
          items:
            type: string
        verificationStatus:
          type: string
          enum: [pending, approved, rejected]
        avgRating:
          type: [number, 'null']
        totalEngagements:
          type: integer
        hourlyRate:
          type: [number, 'null']
        availabilityStatus:
          type: string
          enum: [open, booked]
        role:
          type: [string, 'null']
          enum: [trainer, nutritionist, null]

    ProfessionalProfileInput:
      type: object
      properties:
        specialty:
          type: string
        bio:
          type: string
        yearsExperience:
          type: integer
        certifications:
          type: array
          items:
            type: string
        hourlyRate:
          type: number
        availabilityStatus:
          type: string
          enum: [open, booked]

    ProfessionalListResponse:
      type: object
      required: [professionals, total]
      properties:
        professionals:
          type: array
          items:
            $ref: '#/components/schemas/ProfessionalProfile'
        total:
          type: integer

    VerificationDecision:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        reason:
          type: string

    # ─── Posts ─────────────────────────────────────────────────────────────
    Post:
      type: object
      required: [id, clientId, title, status, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: string
        title:
          type: string
        description:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
        needsTrainer:
          type: boolean
        needsNutritionist:
          type: boolean
        budgetMin:
          type: [number, 'null']
        budgetMax:
          type: [number, 'null']
        durationWeeks:
          type: [integer, 'null']
        status:
          type: string
          enum: [open, in_progress, completed, closed]
        visibility:
          type: string
          enum: [public, invite_only]
        bidCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    PostDetail:
      type: object
      required: [id, clientId, title, status, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: string
        title:
          type: string
        description:
          type: [string, 'null']
        tags:
          type: array
          items:
            type: string
        needsTrainer:
          type: boolean
        needsNutritionist:
          type: boolean
        budgetMin:
          type: [number, 'null']
        budgetMax:
          type: [number, 'null']
        durationWeeks:
          type: [integer, 'null']
        status:
          type: string
          enum: [open, in_progress, completed, closed]
        visibility:
          type: string
          enum: [public, invite_only]
        bidCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        client:
          $ref: '#/components/schemas/User'
        bids:
          type: array
          items:
            $ref: '#/components/schemas/BidWithProfessional'

    PostInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        needsTrainer:
          type: boolean
        needsNutritionist:
          type: boolean
        budgetMin:
          type: number
        budgetMax:
          type: number
        durationWeeks:
          type: integer
        visibility:
          type: string
          enum: [public, invite_only]

    PostUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [open, in_progress, completed, closed]
        budgetMin:
          type: number
        budgetMax:
          type: number
        durationWeeks:
          type: integer

    PostListResponse:
      type: object
      required: [posts, total]
      properties:
        posts:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        total:
          type: integer

    # ─── Bids ──────────────────────────────────────────────────────────────
    Bid:
      type: object
      required: [id, postId, professionalId, status, createdAt]
      properties:
        id:
          type: integer
        postId:
          type: integer
        professionalId:
          type: string
        proposalText:
          type: [string, 'null']
        price:
          type: [number, 'null']
        estimatedWeeks:
          type: [integer, 'null']
        introOffer:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time

    BidWithProfessional:
      type: object
      required: [id, postId, professionalId, status, createdAt]
      properties:
        id:
          type: integer
        postId:
          type: integer
        professionalId:
          type: string
        proposalText:
          type: [string, 'null']
        price:
          type: [number, 'null']
        estimatedWeeks:
          type: [integer, 'null']
        introOffer:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
        professional:
          $ref: '#/components/schemas/ProfessionalProfile'

    BidWithPost:
      type: object
      required: [id, postId, professionalId, status, createdAt]
      properties:
        id:
          type: integer
        postId:
          type: integer
        professionalId:
          type: string
        proposalText:
          type: [string, 'null']
        price:
          type: [number, 'null']
        estimatedWeeks:
          type: [integer, 'null']
        introOffer:
          type: [string, 'null']
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
        post:
          $ref: '#/components/schemas/Post'

    BidInput:
      type: object
      required: [proposalText, price]
      properties:
        proposalText:
          type: string
          minLength: 1
        price:
          type: number
        estimatedWeeks:
          type: integer
        introOffer:
          type: string

    BidStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, rejected]

    # ─── Engagements ───────────────────────────────────────────────────────
    EngagementSummary:
      type: object
      required: [id, postId, clientId, status, startDate]
      properties:
        id:
          type: integer
        postId:
          type: integer
        clientId:
          type: string
        trainerId:
          type: [string, 'null']
        nutritionistId:
          type: [string, 'null']
        status:
          type: string
          enum: [active, paused, completed, disputed]
        startDate:
          type: string
          format: date-time
        endDate:
          type: [string, 'null']
          format: date-time
        totalAmount:
          type: [number, 'null']
        postTitle:
          type: [string, 'null']
        clientName:
          type: [string, 'null']
        clientAvatarUrl:
          type: [string, 'null']

    EngagementDetail:
      type: object
      required: [id, postId, clientId, status, startDate]
      properties:
        id:
          type: integer
        postId:
          type: integer
        clientId:
          type: string
        trainerId:
          type: [string, 'null']
        nutritionistId:
          type: [string, 'null']
        status:
          type: string
          enum: [active, paused, completed, disputed]
        startDate:
          type: string
          format: date-time
        endDate:
          type: [string, 'null']
          format: date-time
        totalAmount:
          type: [number, 'null']
        escrowStatus:
          type: [string, 'null']
          enum: [held, released, refunded, null]
        client:
          $ref: '#/components/schemas/User'
        trainer:
          oneOf:
            - $ref: '#/components/schemas/UserWithProfile'
            - type: 'null'
        nutritionist:
          oneOf:
            - $ref: '#/components/schemas/UserWithProfile'
            - type: 'null'
        post:
          $ref: '#/components/schemas/Post'
        clientProfile:
          oneOf:
            - $ref: '#/components/schemas/ClientProfile'
            - type: 'null'

    EngagementUpdate:
      type: object
