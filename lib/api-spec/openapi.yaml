openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FitBid API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: users
    description: User and profile operations
  - name: posts
    description: Client post operations
  - name: bids
    description: Bid operations
  - name: engagements
    description: Engagement and dashboard operations
  - name: workouts
    description: Workout plan operations
  - name: meals
    description: Meal plan operations
  - name: progress
    description: Progress tracking
  - name: checkins
    description: Check-in operations
  - name: messages
    description: Messaging
  - name: reviews
    description: Review operations
  - name: notifications
    description: Notification operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  # ─── USERS ────────────────────────────────────────────────────────────────
  /users/me:
    get:
      tags: [users]
      operationId: getMyUser
      summary: Get current user with profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithProfile'
        '401':
          description: Unauthorized
    patch:
      tags: [users]
      operationId: updateMyUser
      summary: Update current user info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithProfile'

  /users/{userId}:
    get:
      tags: [users]
      operationId: getUser
      summary: Get public user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithProfile'
        '404':
          description: Not found

  /users/me/complete-onboarding:
    post:
      tags: [users]
      operationId: completeOnboarding
      summary: Complete onboarding and set role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingInput'
      responses:
        '200':
          description: Onboarding completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWithProfile'

  # ─── CLIENT PROFILES ───────────────────────────────────────────────────────
  /client-profiles/me:
    get:
      tags: [users]
      operationId: getMyClientProfile
      summary: Get my client profile
      responses:
        '200':
          description: Client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientProfile'
    put:
      tags: [users]
      operationId: upsertClientProfile
      summary: Create or update client profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientProfileInput'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientProfile'

  # ─── PROFESSIONAL PROFILES ─────────────────────────────────────────────────
  /professional-profiles:
    get:
      tags: [users]
      operationId: listProfessionals
      summary: Browse professional directory
      parameters:
        - name: specialty
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [trainer, nutritionist]
        - name: minRating
          in: query
          schema:
            type: number
        - name: maxRate
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of professionals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessionalListResponse'

  /professional-profiles/featured:
    get:
      tags: [users]
      operationId: getFeaturedProfessionals
      summary: Get featured professionals for landing page
      responses:
        '200':
          description: Featured professionals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfessionalProfile'

  /professional-profiles/me:
    get:
      tags: [users]
      operationId: getMyProfessionalProfile
      summary: Get my professional profile
      responses:
        '200':
          description: Professional profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessionalProfile'
    put:
      tags: [users]
      operationId: upsertProfessionalProfile
      summary: Create or update professional profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfessionalProfileInput'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessionalProfile'

  /professional-profiles/{userId}:
    get:
      tags: [users]
      operationId: getProfessionalProfile
      summary: Get a professional's public profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Professional profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessionalProfile'
        '404':
          description: Not found

  # ─── POSTS ────────────────────────────────────────────────────────────────
  /posts:
    get:
      tags: [posts]
      operationId: listPosts
      summary: Browse open client posts
      parameters:
        - name: tags
          in: query
          schema:
            type: string
        - name: budgetMin
          in: query
          schema:
            type: number
        - name: budgetMax
          in: query
          schema:
            type: number
        - name: needsTrainer
          in: query
          schema:
            type: boolean
        - name: needsNutritionist
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, completed, closed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListResponse'
    post:
      tags: [posts]
      operationId: createPost
      summary: Create a new client post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
      responses:
        '201':
          description: Created post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

  /posts/mine:
    get:
      tags: [posts]
      operationId: getMyPosts
      summary: Get my posts (client view)
      responses:
        '200':
          description: My posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'

  /posts/{postId}:
    get:
      tags: [posts]
      operationId: getPost
      summary: Get post details with bids
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
        '404':
          description: Not found
    patch:
      tags: [posts]
      operationId: updatePost
      summary: Update a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Updated post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
    delete:
      tags: [posts]
      operationId: deletePost
      summary: Close/delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

  # ─── BIDS ─────────────────────────────────────────────────────────────────
  /posts/{postId}/bids:
    get:
      tags: [bids]
      operationId: listBids
      summary: Get bids for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of bids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BidWithProfessional'
    post:
      tags: [bids]
      operationId: createBid
      summary: Submit a bid on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidInput'
      responses:
        '201':
          description: Bid submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bid'

  /bids/mine:
    get:
      tags: [bids]
      operationId: getMyBids
      summary: Get my submitted bids (professional view)
      responses:
        '200':
          description: My bids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BidWithPost'

  /bids/{bidId}:
    get:
      tags: [bids]
      operationId: getBid
      summary: Get bid details
      parameters:
        - name: bidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bid detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidWithProfessional'
    patch:
      tags: [bids]
      operationId: updateBidStatus
      summary: Accept or reject a bid
      parameters:
        - name: bidId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidStatusUpdate'
      responses:
        '200':
          description: Updated bid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bid'

  # ─── ENGAGEMENTS ──────────────────────────────────────────────────────────
  /engagements:
    get:
      tags: [engagements]
      operationId: listEngagements
      summary: List engagements for current user
      responses:
        '200':
          description: List of engagements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EngagementSummary'

  /engagements/{engagementId}:
    get:
      tags: [engagements]
      operationId: getEngagement
      summary: Get engagement details
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Engagement details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementDetail'
        '404':
          description: Not found
    patch:
      tags: [engagements]
      operationId: updateEngagement
      summary: Update engagement status
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngagementUpdate'
      responses:
        '200':
          description: Updated engagement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementDetail'

  /engagements/{engagementId}/overview:
    get:
      tags: [engagements]
      operationId: getEngagementOverview
      summary: Get engagement overview stats
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Engagement overview stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementOverview'

  # ─── WORKOUT PLANS ─────────────────────────────────────────────────────────
  /engagements/{engagementId}/workout-plans:
    get:
      tags: [workouts]
      operationId: listWorkoutPlans
      summary: List workout plans for engagement
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workout plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutPlan'
    post:
      tags: [workouts]
      operationId: createWorkoutPlan
      summary: Create a workout plan
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutPlanInput'
      responses:
        '201':
          description: Created workout plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlan'

  /workout-plans/{planId}:
    get:
      tags: [workouts]
      operationId: getWorkoutPlan
      summary: Get workout plan with days and exercises
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workout plan detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlanDetail'
    patch:
      tags: [workouts]
      operationId: updateWorkoutPlan
      summary: Update a workout plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutPlanUpdate'
      responses:
        '200':
          description: Updated workout plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutPlan'

  /workout-plans/{planId}/days:
    post:
      tags: [workouts]
      operationId: addWorkoutDay
      summary: Add a workout day to a plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutDayInput'
      responses:
        '201':
          description: Created workout day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDay'

  /workout-days/{dayId}:
    patch:
      tags: [workouts]
      operationId: updateWorkoutDay
      summary: Update a workout day
      parameters:
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutDayUpdate'
      responses:
        '200':
          description: Updated workout day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutDay'
    delete:
      tags: [workouts]
      operationId: deleteWorkoutDay
      summary: Delete a workout day
      parameters:
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

  /workout-days/{dayId}/exercises:
    post:
      tags: [workouts]
      operationId: addExercise
      summary: Add an exercise to a workout day
      parameters:
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseInput'
      responses:
        '201':
          description: Created exercise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'

  /exercises/{exerciseId}:
    patch:
      tags: [workouts]
      operationId: updateExercise
      summary: Update an exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExerciseUpdate'
      responses:
        '200':
          description: Updated exercise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exercise'
    delete:
      tags: [workouts]
      operationId: deleteExercise
      summary: Delete an exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

  /engagements/{engagementId}/workout-logs:
    get:
      tags: [workouts]
      operationId: listWorkoutLogs
      summary: Get workout completion logs for engagement
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workout logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkoutLog'
    post:
      tags: [workouts]
      operationId: logWorkout
      summary: Log a workout completion
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkoutLogInput'
      responses:
        '201':
          description: Logged workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutLog'

  # ─── MEAL PLANS ────────────────────────────────────────────────────────────
  /engagements/{engagementId}/meal-plans:
    get:
      tags: [meals]
      operationId: listMealPlans
      summary: List meal plans for engagement
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Meal plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MealPlan'
    post:
      tags: [meals]
      operationId: createMealPlan
      summary: Create a meal plan
      parameters:
        - name: engagementId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MealPlanInput'
      responses:
        '201':
          description: Created meal plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlan'

  /meal-plans/{planId}:
    get:
      tags: [meals]
      operationId: getMealPlan
      summary: Get meal plan with meals
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Meal plan detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlanDetail'
    patch:
      tags: [meals]
      operationId: updateMealPlan
      summary: Update a meal plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MealPlanUpdate'
      responses:
        '200':
          description: Updated meal plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealPlan'

  /meal-plans/{planId}/meals:
    post:
      tags: [meals]
      operationId: addMeal
      summary: Add a meal to a meal plan
      parameters:
        - name: planId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MealInput'
      responses:
        '201':
          description: Created meal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meal'

  /meals/{mealId}:
    patch:
      tags: [meals]
      operationId: updateMeal
      summary: Update a meal
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MealUpdate'
      responses:
        '200':
          description: Updated meal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meal'
    delete:
      tags: [meals]
      operationId: deleteMeal
      summary: Delete a meal
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted

  /engagements/{engagementId}/meal-logs:
    get:
      tags: [meals]
      operationId: listMealLogs
